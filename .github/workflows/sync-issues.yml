name: Sync Issues Across Repos

on:
  issues:
    types: [labeled]

jobs:
  sync-issues:
    runs-on: ubuntu-latest
    permissions:
      issues: read
      contents: read

    steps:
      - name: Sync issue to smart-contract repo
        if: contains(github.event.issue.labels.*.name, 'sync:smart-contract') || contains(github.event.issue.labels.*.name, 'sync:all')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sourceIssue = context.issue;
            const sourceRepo = context.repo;
            const targetRepo = 'ILN-Smart-Contract';
            const sourceLink = `https://github.com/${sourceRepo.owner}/${sourceRepo.repo}/issues/${sourceIssue.number}`;

            const issueBody = `> 🔗 **This is a synced issue from the main ILN repo.** Original: [#${sourceIssue.number}](${sourceLink})\n\n${context.payload.issue.body}`;

            try {
              const response = await github.rest.issues.create({
                owner: sourceRepo.owner,
                repo: targetRepo,
                title: context.payload.issue.title,
                body: issueBody,
                labels: context.payload.issue.labels.map(l => l.name).filter(l => !l.startsWith('sync:'))
              });
              
              console.log(`✅ Created issue in ${targetRepo}: #${response.data.number}`);
            } catch (error) {
              console.error(`❌ Failed to create issue in ${targetRepo}:`, error.message);
              throw error;
            }

      - name: Sync issue to frontend repo
        if: contains(github.event.issue.labels.*.name, 'sync:frontend') || contains(github.event.issue.labels.*.name, 'sync:all')
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const sourceIssue = context.issue;
            const sourceRepo = context.repo;
            const targetRepo = 'ILN-Frontend';
            const sourceLink = `https://github.com/${sourceRepo.owner}/${sourceRepo.repo}/issues/${sourceIssue.number}`;

            const issueBody = `> 🔗 **This is a synced issue from the main ILN repo.** Original: [#${sourceIssue.number}](${sourceLink})\n\n${context.payload.issue.body}`;

            try {
              const response = await github.rest.issues.create({
                owner: sourceRepo.owner,
                repo: targetRepo,
                title: context.payload.issue.title,
                body: issueBody,
                labels: context.payload.issue.labels.map(l => l.name).filter(l => !l.startsWith('sync:'))
              });
              
              console.log(`✅ Created issue in ${targetRepo}: #${response.data.number}`);
            } catch (error) {
              console.error(`❌ Failed to create issue in ${targetRepo}:`, error.message);
              throw error;
            }

      - name: Leave comment with sync links
        if: success()
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const syncLabels = context.payload.issue.labels
              .map(l => l.name)
              .filter(l => l.startsWith('sync:'));

            if (syncLabels.length === 0) return;

            const syncComments = [];
            const sourceRepo = context.repo.owner;

            if (syncLabels.includes('sync:smart-contract') || syncLabels.includes('sync:all')) {
              syncComments.push(`- 📋 [ILN-Smart-Contract](https://github.com/${sourceRepo}/ILN-Smart-Contract/issues) (Rust contracts)`);
            }

            if (syncLabels.includes('sync:frontend') || syncLabels.includes('sync:all')) {
              syncComments.push(`- 🖥️ [ILN-Frontend](https://github.com/${sourceRepo}/ILN-Frontend/issues) (Next.js dApp)`);
            }

            const commentBody = `## 🔄 Cross-Repo Sync\n\nThis issue has been synced to:\n\n${syncComments.join('\n')}`;

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: commentBody
            });
